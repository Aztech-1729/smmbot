version: '3.8'

services:
  bot:
    build: .
    container_name: smm_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mongo
      - redis
    networks:
      - smm_network

  mongo:
    image: mongo:7.0
    container_name: smm_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: securepassword
    volumes:
      - mongo_data:/data/db
    networks:
      - smm_network
    ports:
      - "27017:27017" # Optional: expose for external admin tools

  redis:
    image: redis:7.2-alpine
    container_name: smm_redis
    restart: always
    command: redis-server --requirepass securepassword
    volumes:
      - redis_data:/data
    networks:
      - smm_network
    ports:
      - "6379:6379" # Optional: expose for external admin tools

networks:
  smm_network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
